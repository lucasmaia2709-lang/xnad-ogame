<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apanha Rosquinhas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Impede o comportamento de "puxar para recarregar" nos telemóveis e o scroll */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #fdf2f8; /* Fundo rosa claro */
            touch-action: none; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 600px;
            margin: 0 auto;
            background-color: #fbcfe8;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Deixa os cliques passarem para o canvas */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .ui-panel {
            pointer-events: auto; /* Permite clicar no painel */
            background: rgba(255, 255, 255, 0.9);
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            font-weight: bold;
            color: #831843;
            pointer-events: none;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- Tela do Jogo -->
    <canvas id="gameCanvas"></canvas>
    
    <!-- HUD (Pontuação e Vidas) -->
    <div id="hud">
        <div>Pontos: <span id="scoreDisplay">0</span></div>
        <div>Vidas: <span id="livesDisplay">❤️❤️❤️</span></div>
    </div>

    <!-- Ecrãs de UI (Início e Fim de Jogo) -->
    <div id="ui-layer">
        <div id="startScreen" class="ui-panel">
            <h1 class="text-3xl font-bold text-pink-600 mb-4">Apanha o Dinheiro! 💰</h1>
            <p class="text-gray-600 mb-6">Move o Xandão para não perder a corrupção!</p>
            <p class="text-sm text-gray-500 mb-4">Usa as setas ⬅️ ➡️ ou desliza o dedo no ecrã.</p>

            <button id="startBtn" class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-6 rounded-full shadow-lg transition transform hover:scale-105 active:scale-95">
                Começar a Jogar
            </button>
        </div>

        <div id="gameOverScreen" class="ui-panel hidden">
            <h1 class="text-4xl font-bold text-red-500 mb-2">Fim de Jogo!</h1>
            <p class="text-xl text-gray-700 mb-4">Acumulaste <span id="finalScore" class="font-bold text-pink-600">0</span>.</p>
            <button id="restartBtn" class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-6 rounded-full shadow-lg transition transform hover:scale-105 active:scale-95">
                Jogar Novamente
            </button>
        </div>

        <div id="winScreen" class="ui-panel hidden">
            <h1 class="text-4xl font-bold text-green-500 mb-2">Parabéns! 🎉</h1>
            <p class="text-xl text-gray-700 mb-4">Atingiste a meta de <span class="font-bold text-green-600">R$ 129.000.000</span>!</p>
            <button id="winRestartBtn" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-full shadow-lg transition transform hover:scale-105 active:scale-95">
                Jogar Novamente
            </button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('game-container');

    // UI Elements
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const winScreen = document.getElementById('winScreen');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const winRestartBtn = document.getElementById('winRestartBtn');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const livesDisplay = document.getElementById('livesDisplay');
    const finalScoreDisplay = document.getElementById('finalScore');

    // 🎨 COLOCA OS LINKS DAS TUAS IMAGENS AQUI:
    // Mantém as aspas e cola o link lá dentro. Deixa vazio ('') se quiseres usar o desenho padrão.
    // As barras foram alteradas para barras normais (/) para que o Javascript consiga ler o caminho corretamente no Windows.
    const urlImagemPauzinho = 'https://github.com/lucasmaia2709-lang/xnad-ogame/blob/main/Design%20sem%20nome%20(1).png'; 
    const urlImagemItem = 'C:/Users/lucas/Desktop/pngtree-money-sack-cartoon-image-png-image_16085048.png';     

    let customPaddleImg = null;
    let customDonutImg = null;

    // Carregar as imagens diretamente do link no início
    function carregarImagensDoLink() {
        if (urlImagemPauzinho !== '') {
            const imgBase = new Image();
            imgBase.onload = () => { 
                customPaddleImg = imgBase; 
                
                // Calcula o tamanho para não distorcer a imagem
                const maxWidth = 130;  
                const maxHeight = 130; 
                const scaleFactor = Math.min(maxWidth / imgBase.width, maxHeight / imgBase.height);
                
                paddle.w = imgBase.width * scaleFactor;
                paddle.h = imgBase.height * scaleFactor;
                paddle.y = canvas.height - paddle.h - 20;

                if (!isPlaying) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    drawBankHeader(); 
                    drawPaddle(); 
                }
            };
            imgBase.src = urlImagemPauzinho;
        }

        if (urlImagemItem !== '') {
            const imgItem = new Image();
            imgItem.onload = () => { customDonutImg = imgItem; };
            imgItem.src = urlImagemItem;
        }
    }
    carregarImagensDoLink(); // Executa o carregamento das imagens

    // Estado do Jogo
    let isPlaying = false;
    let score = 0;
    let lives = 3;
    let animationId;
    let frameCount = 0;
    
    // Configurações e Variáveis
    let donuts = [];
    let donutSpawnRate = 60; // Nasce uma rosquinha a cada 60 frames (aprox 1 segundo)
    let baseDonutSpeed = 3;

    // Classe da Rosquinha (Item que cai)
    class Donut {
        constructor() {
            this.size = 40; // Tamanho base (fonte do emoji)
            this.radius = this.size / 2;
            
            // Posição aleatória no eixo X
            this.x = Math.random() * (canvas.width - this.size) + this.radius;
            this.y = -this.size; // Começa fora do ecrã no topo
            
            // A velocidade aumenta ligeiramente com a pontuação (ajustado para blocos de 100.000)
            this.speed = baseDonutSpeed + (Math.random() * 2) + ((score / 100000) * 0.05);
            this.emoji = '💰';
            
            // Ligeira rotação para efeito visual
            this.rotation = Math.random() * Math.PI * 2;
            this.rotationSpeed = (Math.random() - 0.5) * 0.1;
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            
            // Usar imagem personalizada se existir, senão usa o emoji
            if (customDonutImg) {
                ctx.drawImage(customDonutImg, -this.radius, -this.radius, this.size, this.size);
            } else {
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.emoji, 0, 0);
            }
            
            ctx.restore();
        }

        update() {
            this.y += this.speed;
            this.rotation += this.rotationSpeed;
            this.draw();
        }
    }

    // O "Pauzinho" (Plataforma)
    const paddle = {
        w: 120,
        h: 20,
        x: 0,
        y: 0,
        speed: 8,
        dx: 0,
        color: '#be185d' // Rosa escuro
    };

    // Redimensionar o Canvas para encaixar no contentor
    function resizeCanvas() {
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        paddle.y = canvas.height - paddle.h - 20; // 20px acima do fundo
        
        // Colocar o pauzinho no meio inicialmente, se não estiver a jogar
        if (!isPlaying && paddle.x === 0) {
            paddle.x = canvas.width / 2 - paddle.w / 2;
        }
        
        // Garantir que o pauzinho não fica fora do ecrã após redimensionar
        if (paddle.x + paddle.w > canvas.width) {
            paddle.x = canvas.width - paddle.w;
        }
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas(); // Chamada inicial

    // Desenhar o Cabeçalho do Banco Master (Topo)
    function drawBankHeader() {
        ctx.save();
        ctx.textAlign = 'center';
        
        // Sombra para dar destaque
        ctx.shadowColor = 'rgba(0,0,0,0.15)';
        ctx.shadowBlur = 4;
        ctx.shadowOffsetX = 2;
        ctx.shadowOffsetY = 2;

        // Ícone/Imagem do Banco
        ctx.font = '50px Arial';
        ctx.textBaseline = 'bottom';
        ctx.fillText('🏦', canvas.width / 2, 60);

        // Texto "BANCO MASTER"
        ctx.font = 'bold 36px "Segoe UI", Arial, sans-serif';
        ctx.fillStyle = '#831843'; // Cor rosa escura a combinar com o tema
        ctx.textBaseline = 'top';
        ctx.fillText('BANCO MASTER', canvas.width / 2, 65);
        
        ctx.restore();
    }

    // Desenhar o Pauzinho
    function drawPaddle() {
        if (customPaddleImg) {
            ctx.drawImage(customPaddleImg, paddle.x, paddle.y, paddle.w, paddle.h);
        } else {
            ctx.fillStyle = paddle.color;
            ctx.beginPath();
            // Desenhar com cantos arredondados
            ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 10);
            ctx.fill();
            ctx.closePath();
        }
    }

    // Mover o Pauzinho (Teclado)
    function movePaddle() {
        paddle.x += paddle.dx;

        // Detecção de colisão com as paredes do ecrã
        if (paddle.x < 0) {
            paddle.x = 0;
        }
        if (paddle.x + paddle.w > canvas.width) {
            paddle.x = canvas.width - paddle.w;
        }
    }

    // Lidar com criação de rosquinhas
    function handleDonuts() {
        // Gerar nova rosquinha
        if (frameCount % donutSpawnRate === 0) {
            donuts.push(new Donut());
            // Aumentar a dificuldade aos poucos
            if (donutSpawnRate > 20) {
                donutSpawnRate = Math.max(20, 60 - Math.floor(score / 5));
            }
        }

        for (let i = 0; i < donuts.length; i++) {
            let donut = donuts[i];
            donut.update();

            // Detecção de Colisão: Rosquinha -> Pauzinho
            // Usamos uma lógica simples de caixas delimitadoras (AABB)
            let donutBottom = donut.y + donut.radius - 5; // -5 para dar margem visual ao emoji
            let donutLeft = donut.x - donut.radius;
            let donutRight = donut.x + donut.radius;

            if (donutBottom >= paddle.y && 
                donut.y < paddle.y + paddle.h &&
                donutRight >= paddle.x && 
                donutLeft <= paddle.x + paddle.w) {
                
                // Apanhou!
                donuts.splice(i, 1);
                i--;
                score += 100000;
                updateHUD();

                // Condição de Vitória: Atingir 129 Milhões
                if (score >= 129000000) {
                    winGame();
                }
                
                continue;
            }

            // Se a rosquinha passar do fundo do ecrã (Perdeu uma vida)
            if (donut.y - donut.radius > canvas.height) {
                donuts.splice(i, 1);
                i--;
                lives--;
                updateHUD();
                
                // Piscar ecrã de vermelho quando perde vida
                canvas.style.backgroundColor = '#fecaca';
                setTimeout(() => { canvas.style.backgroundColor = 'transparent'; }, 150);

                if (lives <= 0) {
                    endGame();
                }
            }
        }
    }

    // Atualizar Pontos e Vidas no HTML
    function updateHUD() {
        scoreDisplay.innerText = "R$ " + score.toLocaleString('pt-BR');
        let hearts = '';
        for (let i = 0; i < lives; i++) hearts += '❤️';
        for (let i = lives; i < 3; i++) hearts += '🖤'; // Corações vazios
        livesDisplay.innerText = hearts;
    }

    // Loop Principal do Jogo
    function gameLoop() {
        if (!isPlaying) return;

        // Limpar canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        drawBankHeader(); // Desenha o Título e o Banco no topo
        drawPaddle();
        movePaddle();
        handleDonuts();

        frameCount++;
        animationId = requestAnimationFrame(gameLoop);
    }

    // Controles do Teclado
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === 'Right') {
            paddle.dx = paddle.speed;
        } else if (e.key === 'ArrowLeft' || e.key === 'Left') {
            paddle.dx = -paddle.speed;
        }
    });

    document.addEventListener('keyup', (e) => {
        if (e.key === 'ArrowRight' || e.key === 'Right' || e.key === 'ArrowLeft' || e.key === 'Left') {
            paddle.dx = 0;
        }
    });

    // Controles de Toque e Rato
    function handleInputMove(e) {
        if (!isPlaying) return;
        
        // Prevenir comportamento padrão
        e.preventDefault();
        
        let clientX;
        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
        } else {
            clientX = e.clientX;
        }

        // Obter a posição relativa ao canvas
        const rect = canvas.getBoundingClientRect();
        let relativeX = clientX - rect.left;

        // Centrar o pauzinho no dedo/rato
        paddle.x = relativeX - (paddle.w / 2);

        // Limites da tela
        if (paddle.x < 0) paddle.x = 0;
        if (paddle.x + paddle.w > canvas.width) paddle.x = canvas.width - paddle.w;
    }

    canvas.addEventListener('touchmove', handleInputMove, { passive: false });
    canvas.addEventListener('mousemove', handleInputMove);

    // Começar o Jogo
    function startGame() {
        isPlaying = true;
        score = 0;
        lives = 3;
        donuts = [];
        frameCount = 0;
        donutSpawnRate = 60;
        
        paddle.x = canvas.width / 2 - paddle.w / 2;
        
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        winScreen.classList.add('hidden');
        
        updateHUD();
        gameLoop();
    }

    // Terminar o Jogo (Derrota)
    function endGame() {
        isPlaying = false;
        cancelAnimationFrame(animationId);
        
        finalScoreDisplay.innerText = "R$ " + score.toLocaleString('pt-BR');
        gameOverScreen.classList.remove('hidden');
    }

    // Terminar o Jogo (Vitória)
    function winGame() {
        isPlaying = false;
        cancelAnimationFrame(animationId);
        winScreen.classList.remove('hidden');
    }

    // Eventos dos Botões
    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);
    winRestartBtn.addEventListener('click', startGame);

    // Desenhar o cenário inicial mesmo antes do jogo começar
    drawBankHeader();
    drawPaddle();

</script>
</body>
</html>
